# Plugin coordinates
pluginGroup = com.github.paulmanoni.nexus
pluginVersion = 0.2.2

# Target IDE to build/run against. 2024.1 is the floor we support (build 241).
# Compiles on JDK 17; newer platforms (242+) need JDK 21.
platformType = IC
platformVersion = 2024.1.7

# since/until build range advertised by the plugin.
pluginSinceBuild = 241

# GoLand version used only by the `runGoLand` sandbox task (not the build target).
golandVersion = 2024.1.6

# LSP4IJ — the open-source LSP client we depend on, pulled from the JetBrains
# Marketplace. If Gradle can't resolve this version, bump it to a build listed at
# https://plugins.jetbrains.com/plugin/23257-lsp4ij/versions that supports 241+.
lsp4ijVersion = 0.10.0

# Gradle ergonomics
org.gradle.caching = true
org.gradle.configuration-cache = false
kotlin.stdlib.default.dependency = false
