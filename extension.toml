id = "nexus"
name = "Nexus"
version = "0.2.0"
schema_version = 1
authors = ["Paul Manoni <01paulmanoni@gmail.com>"]
description = "Nexus framework support for Zed: //@ decorator handlers and nexus.toml — diagnostics, outline, hover, and completion. Zero-setup (the language server auto-downloads)."
repository = "https://github.com/paulmanoni/nexus-zed"

# Attaches a companion language server (nexus-lsp) to Go and TOML buffers,
# running alongside gopls / the TOML server. It understands nexus's //@ decorator
# annotations in Go and the nexus.toml schema (diagnostics, hover, completion).
# The server itself only acts on .go files and on files named nexus.toml; other
# TOML files (Cargo.toml, etc.) get no nexus features.
[language_servers.nexus-lsp]
name = "Nexus LSP"
languages = ["Go", "TOML"]
