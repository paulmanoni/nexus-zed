id = "nexus"
name = "Nexus"
version = "0.1.0"
schema_version = 1
authors = ["Paul Manoni <01paulmanoni@gmail.com>"]
description = "Nexus framework support for Zed: live detection of //@ decorator handlers — diagnostics, outline, hover, and completion."
repository = "https://github.com/paulmanoni/nexus-zed"

# Attaches a companion language server (nexus-lsp) to Go buffers, running
# alongside gopls. It understands nexus's //@ decorator annotations.
[language_servers.nexus-lsp]
name = "Nexus LSP"
languages = ["Go"]
